apiVersion: training.educates.dev/v1beta1
kind: Workshop
metadata:
  name: spring-enterprise-guides-spring-ai-intro
spec:
  title: Spring Academy - Enterprise Guides - Spring AI Intro
  description: "A workshop that introduces you to Spring AI, a framework that enables you to integrate GenAI capabilites into your enterprise applications"
  difficulty: beginner
  duration: 2h
  vendor: Broadcom
  workshop:
    image: jdk21-environment:*
    files:
      - http:
          # the name of the tar.gz here should make the workshop name
          url: "$(ingress_protocol)://$(workshop_namespace)-files.$(ingress_domain)/spring-enterprise-guides-spring-ai-intro.tar.gz"
  request:
    parameters:
    - name: USER_DOMAIN
      value: "unknown.domain"
    - name: USER_EMAIL
      value: "somebody@unknown.domain"
  session:
    namespaces:
      security:
        token:
          # This wasn't being done before but should be so that workshop user
          # cannot access the Educates cluster session namespace, which they don't need.
          # See note below though about volume mount for token.
          enabled: false
    env:
    - name: LAB_NUMBER
      value: "1"
    - name: WEBSERVER
      value: "$(ingress_protocol)://$(workshop_namespace)-files.$(ingress_domain)"
    - name: BOOTSTRAP_COMMAND
      value: ":"
    resources:
      memory: 4Gi
    applications:
      terminal:
        enabled: true
        layout: split
      editor:
        enabled: true
  environment:
    objects:
    - apiVersion: secrets.educates.dev/v1beta1
      kind: SecretCopier
      metadata:
        name: $(workshop_namespace)-spring-enterprise-guides-gcp
      spec:
        rules:
        - sourceSecret: 
            name: gcp
            namespace: spring-academy
          targetSecret:
            name: gcp
          targetNamespaces:
            nameSelector:
              matchNames:
              - spring-enterprise-guides-*
    - apiVersion: v1
      kind: Service
      metadata:
        name: $(workshop_namespace)-files
        namespace: $(workshop_namespace)
      spec:
        type: ClusterIP
        ports:
        - port: 80
          protocol: TCP
          targetPort: 8080
        selector:
          deployment: files
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: $(workshop_namespace)-files
        namespace: $(workshop_namespace)
      spec:
        tls:
        - hosts:
            - $(workshop_namespace)-files.$(ingress_domain)
          secretName: $(ingress_secret)
        rules:
        - host: $(workshop_namespace)-files.$(ingress_domain)
          http:
            paths:
            - backend:
                service:
                  name: $(workshop_namespace)-files
                  port:
                    number: 80
              pathType: Prefix
              path: /
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: $(workshop_namespace)-files
        namespace: $(workshop_namespace)
      spec:
        serviceAccountName: $(service_account)
        replicas: 1
        selector:
          matchLabels:
            deployment: files
        strategy:
          type: Recreate
        template:
          metadata:
            labels:
              deployment: files
          spec:
            containers:
            - name: files
              image: ghcr.io/spring-academy/spring-enterprise-guides:${VERSION}
